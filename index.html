<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第85回 城北祭 - 翔 - 公式サイト</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;500;700&family=Zen+Dots&family=Shippori+Mincho:wght@600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS設定 (デザイン) --- */
        :root {
            --bg-color: #050810;
            --main-cyan: #00f0ff;
            --main-blue: #0066ff;
            --main-pink: #ff0055;
            --glass-bg: rgba(20, 30, 40, 0.6);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
            --glass-blur: blur(12px);
        }

        body {
            margin: 0; background-color: var(--bg-color); color: #fff;
            font-family: 'Noto Sans JP', sans-serif; overflow-x: hidden; min-height: 100vh;
        }

        /* 背景アニメーション */
        #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: radial-gradient(circle at bottom, #0f1c2e, #000); }

        /* ヘッダー */
        header {
            position: fixed; top: 0; width: 100%; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; box-sizing: border-box;
            background: rgba(5, 8, 16, 0.8); backdrop-filter: blur(10px); border-bottom: var(--glass-border);
        }
        .logo {
            font-family: 'Shippori Mincho', serif; font-size: 1.6rem;
            background: linear-gradient(90deg, #fff, var(--main-cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        nav ul { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        nav a { text-decoration: none; color: #aab; font-size: 0.9rem; transition: 0.3s; }
        nav a:hover { color: var(--main-cyan); text-shadow: 0 0 8px var(--main-cyan); }

        /* メインビジュアル */
        .hero {
            height: 100vh; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }
        .main-title {
            font-family: 'Shippori Mincho', serif; font-size: clamp(4rem, 15vw, 10rem);
            margin: 0; line-height: 1; color: transparent; -webkit-text-stroke: 1px rgba(255,255,255,0.7);
            position: relative;
        }
        .main-title::before {
            content: '翔'; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #fff 0%, var(--main-cyan) 50%, var(--main-blue) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            opacity: 0; animation: fillText 2s ease-in-out forwards 0.5s;
        }
        @keyframes fillText { to { opacity: 1; filter: drop-shadow(0 0 20px var(--main-cyan)); } }

        /* カウントダウン */
        .timer-box { margin-top: 50px; display: flex; gap: 20px; }
        .time-unit { text-align: center; min-width: 70px; }
        .time-num { font-family: 'Zen Dots'; font-size: 2.5rem; color: #fff; text-shadow: 0 0 10px var(--main-cyan); }
        .time-label { font-size: 0.8rem; color: var(--main-cyan); }

        /* コンテンツ */
        section { max-width: 1100px; margin: 0 auto; padding: 100px 20px; }
        .section-title { font-family: 'Zen Dots'; font-size: 2.5rem; margin-bottom: 50px; text-align: center; border-bottom: 1px solid var(--main-cyan); display: inline-block; }
        
        /* 検索・グリッド */
        .search-wrapper {
            background: var(--glass-bg); padding: 30px; border-radius: 20px;
            border: var(--glass-border); text-align: center; margin-bottom: 50px;
        }
        .search-input {
            width: 80%; padding: 15px; border-radius: 50px; border: 1px solid #444;
            background: rgba(0,0,0,0.5); color: #fff; font-size: 1.1rem; outline: none;
        }
        .filter-btns { margin-top: 20px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .btn-filter {
            background: transparent; border: 1px solid #555; color: #aaa;
            padding: 8px 20px; border-radius: 20px; cursor: pointer; transition: 0.3s;
        }
        .btn-filter.active, .btn-filter:hover { background: var(--main-cyan); color: #000; box-shadow: 0 0 15px var(--main-cyan); border-color: var(--main-cyan); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .card {
            background: rgba(255,255,255,0.03); border: var(--glass-border); border-radius: 12px;
            padding: 20px; position: relative; transition: 0.4s; backdrop-filter: blur(5px);
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.4); box-shadow: 0 10px 30px rgba(0, 240, 255, 0.15); }
        .group-tag { display: inline-block; padding: 3px 10px; border-radius: 4px; font-size: 0.8rem; margin-bottom: 10px; border: 1px solid; }
        .loc-btn {
            margin-top: 15px; padding: 10px; width: 100%; border: 1px solid #555;
            background: transparent; color: #fff; border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        .loc-btn:hover { background: var(--main-blue); border-color: var(--main-blue); }

        /* フッター */
        footer { margin-top: 100px; padding: 50px 20px; background: #020305; text-align: center; color: #666; border-top: 1px solid #222; }
        .admin-link { cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .admin-link:hover { color: var(--main-pink); }

        /* モーダル共通 */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000; backdrop-filter: blur(5px);
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #111; border: 1px solid var(--main-cyan); width: 90%; max-width: 700px;
            padding: 30px; border-radius: 15px; position: relative; box-shadow: 0 0 40px rgba(0, 240, 255, 0.2);
            max-height: 90vh; overflow-y: auto;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #888; }
        
        /* 管理画面スタイル */
        .admin-input { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; margin-bottom: 10px; box-sizing: border-box; }
        .admin-label { color: var(--main-cyan); font-size: 0.9rem; margin-top: 15px; display: block; margin-bottom: 5px; }
        .btn-action { width: 100%; padding: 12px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; color: #fff; transition: 0.3s; }
        .btn-login { background: var(--main-cyan); color: #000; }
        .btn-danger { background: var(--main-pink); }
        .btn-save { background: var(--main-blue); }
        
        /* 管理画面リスト */
        .admin-list-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid #333; font-size: 0.9rem;
        }
        .admin-list-item:hover { background: rgba(255,255,255,0.05); }
        .item-info { flex: 1; text-align: left; }
        .item-actions { display: flex; gap: 5px; }
        .btn-sm { padding: 5px 10px; font-size: 0.8rem; border-radius: 4px; border: none; cursor: pointer; color: #fff; }
        .btn-edit { background: var(--main-blue); }
        .btn-del { background: var(--main-pink); }

        /* 編集フォーム用モーダル */
        #editFormModal { z-index: 1100; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header>
        <div class="logo">城北祭 -翔-</div>
        <nav>
            <ul>
                <li><a href="#top">トップ</a></li>
                <li><a href="#search">企画検索</a></li>
                <li><a href="#access">アクセス</a></li>
            </ul>
        </nav>
    </header>

    <section id="top" class="hero">
        <h1 class="main-title">翔</h1>
        <p style="letter-spacing: 0.4em; margin-top: 20px; color: #aaa;">未来へ、翼を広げて。</p>

        <div class="timer-box">
            <div class="time-unit"><div class="time-num" id="d">00</div><div class="time-label">日</div></div>
            <div class="time-unit"><div class="time-num" id="h">00</div><div class="time-label">時間</div></div>
            <div class="time-unit"><div class="time-num" id="m">00</div><div class="time-label">分</div></div>
            <div class="time-unit"><div class="time-num" id="s">00</div><div class="time-label">秒</div></div>
        </div>
    </section>

    <section id="search">
        <h2 class="section-title">企画検索</h2>
        <div class="search-wrapper">
            <input type="text" id="searchInput" class="search-input" placeholder="検索: 中1-A, お化け屋敷, 焼きそば...">
            <div class="filter-btns">
                <button class="btn-filter active" onclick="filterData('all', this)">すべて</button>
                <button class="btn-filter" onclick="filterData('exp', this)">アトラクション</button>
                <button class="btn-filter" onclick="filterData('exh', this)">展示・公演</button>
                <button class="btn-filter" onclick="filterData('food', this)">食品・模擬店</button>
            </div>
        </div>
        <div class="grid" id="cardGrid"></div>
    </section>

    <section id="access">
        <h2 class="section-title">アクセス</h2>
        <div style="background: rgba(255,255,255,0.05); padding: 40px; border-radius: 15px; text-align: center; border: 1px solid #444;">
            <p>〒174-8711 東京都板橋区東新町2-28-1</p>
            <h3 style="color: var(--main-cyan); margin: 20px 0;">東武東上線「上板橋駅」南口 徒歩10分</h3>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Johoku School Festival Committee.</p>
        <p class="admin-link" onclick="openAdmin()">[ 製作者(管理者)ページへ ]</p>
    </footer>

    <div id="mapModal" class="modal-overlay" onclick="if(event.target==this)document.getElementById('mapModal').style.display='none'">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('mapModal').style.display='none'">&times;</span>
            <h3 id="mapTitle" style="color:var(--main-cyan); border-bottom:1px solid #333; padding-bottom:10px;"></h3>
            <p id="mapLoc" style="font-size:1.2rem; font-weight:bold; margin: 20px 0;"></p>
            <div style="height:250px; background:#ddd; display:flex; align-items:center; justify-content:center; color:#333;">マップ画像エリア</div>
        </div>
    </div>

    <div id="adminModal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeAdmin()">&times;</span>
            <h3 style="color: var(--main-cyan); margin-top:0;">システム管理パネル</h3>
            
            <div id="adminLogin">
                <input type="password" id="passInput" class="admin-input" placeholder="パスワードを入力 (初期: admin)">
                <button onclick="login()" class="btn-action btn-login">認証</button>
                <p id="loginMsg" style="color: var(--main-pink); margin-top: 10px;"></p>
            </div>

            <div id="adminPanel" style="display: none;">
                
                <div style="border: 1px solid #333; padding: 15px; margin-bottom: 20px; border-radius: 8px;">
                    <h4 style="margin:0 0 10px 0; color:#ccc;">📅 開催日時設定 (カウントダウン)</h4>
                    <input type="datetime-local" id="dateInput" class="admin-input" style="color-scheme: dark;">
                    <button onclick="saveDate()" class="btn-action btn-save" style="margin-top:5px;">日時を更新</button>
                </div>

                <div style="border: 1px solid #333; padding: 15px; border-radius: 8px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <h4 style="margin:0; color:#ccc;">🛠 企画データ編集・削除</h4>
                        <button onclick="resetData()" class="btn-sm btn-del">全リセット</button>
                    </div>
                    <div id="adminListContainer" style="max-height: 400px; overflow-y: scroll; border: 1px solid #222;">
                        </div>
                </div>

                <div style="margin-top:20px; text-align:right;">
                    <button onclick="changePass()" style="background:transparent; border:1px solid #444; color:#888; padding:5px 10px; cursor:pointer;">パスワード変更</button>
                </div>
            </div>
        </div>
    </div>

    <div id="editFormModal" class="modal-overlay">
        <div class="modal-content" style="max-width: 500px;">
            <h3 style="color:var(--main-blue);">企画情報の編集</h3>
            <input type="hidden" id="editId">
            
            <label class="admin-label">団体名 (クラス名)</label>
            <input type="text" id="editGroup" class="admin-input">
            
            <label class="admin-label">企画タイトル</label>
            <input type="text" id="editTitle" class="admin-input">
            
            <label class="admin-label">説明文</label>
            <textarea id="editDesc" class="admin-input" rows="3"></textarea>
            
            <label class="admin-label">場所</label>
            <input type="text" id="editLoc" class="admin-input">
            
            <label class="admin-label">カテゴリー</label>
            <select id="editType" class="admin-input">
                <option value="exp">アトラクション</option>
                <option value="exh">展示・公演</option>
                <option value="food">食品・模擬店</option>
            </select>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="document.getElementById('editFormModal').style.display='none'" class="btn-action" style="background:#444;">キャンセル</button>
                <button onclick="saveEdit()" class="btn-action btn-save">保存する</button>
            </div>
        </div>
    </div>

    <script>
        // === 設定定数 ===
        const DB_KEY = 'johoku_data_v2';
        const PASS_KEY = 'johoku_pass_v2';
        const DATE_KEY = 'johoku_date_v2';
        const DEFAULT_PASS = 'admin';
        const DEFAULT_DATE = '2026-09-16T09:00';

        // === 1. データ初期化 ===
        function generateData() {
            const data = [];
            const createClass = (school, grade, className) => {
                const types = ['exp', 'exh', 'food'];
                const type = types[Math.floor(Math.random() * 3)];
                const themes = ["脱出ゲーム", "お化け屋敷", "カジノ", "ジェットコースター", "VR体験", "縁日", "カフェ", "演劇", "映画"];
                let title = themes[Math.floor(Math.random()*themes.length)];
                if(type === 'food') title = ["焼きそば", "タピオカ", "チュロス", "パンケーキ"][Math.floor(Math.random()*4)];

                return {
                    id: `${school}${grade}-${className}`,
                    group: `${school}${grade}-${className}`,
                    title: title,
                    desc: `みんなで作り上げた最高の企画です！ぜひ来てください。`,
                    type: type,
                    location: `${school}校舎教室`
                };
            };
            // 中1-3 (A-G)
            for(let g=1; g<=3; g++) for(let c=0; c<7; c++) data.push(createClass('中', g, String.fromCharCode(65+c)));
            // 高1-3 (A-I)
            for(let g=1; g<=3; g++) for(let c=0; c<9; c++) data.push(createClass('高', g, String.fromCharCode(65+c)));
            return data;
        }

        let eventData = JSON.parse(localStorage.getItem(DB_KEY));
        if (!eventData || eventData.length < 10) { 
            eventData = generateData();
            localStorage.setItem(DB_KEY, JSON.stringify(eventData));
        }

        // === 2. 表示機能 ===
        const grid = document.getElementById('cardGrid');
        let currentFilter = 'all';

        function renderCards() {
            grid.innerHTML = '';
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = eventData.filter(item => {
                const matchType = (currentFilter === 'all') || (item.type === currentFilter);
                const matchText = item.group.toLowerCase().includes(keyword) || item.title.includes(keyword);
                return matchType && matchText;
            });

            if(filtered.length === 0) { grid.innerHTML = '<p style="color:#888;">企画が見つかりません</p>'; return; }

            filtered.forEach((item, idx) => {
                const colors = { exp: '#bc13fe', exh: '#00f0ff', food: '#ffcc00' };
                const labels = { exp: 'ATTRACTION', exh: 'EXHIBIT', food: 'FOOD' };
                const html = `
                    <div class="card" style="animation:fadeIn 0.5s ease ${idx*0.02}s forwards; opacity:0; transform:translateY(10px);">
                        <div style="display:flex; justify-content:space-between;">
                            <span class="group-tag" style="border-color:${colors[item.type]}; color:${colors[item.type]};">${item.group}</span>
                            <span style="font-size:0.7rem; color:#888;">${labels[item.type]}</span>
                        </div>
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                        <button class="loc-btn" onclick="openMap('${item.location}', '${item.title}')">📍 場所確認</button>
                    </div>`;
                grid.insertAdjacentHTML('beforeend', html);
            });
        }
        function filterData(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            renderCards();
        }
        document.getElementById('searchInput').addEventListener('input', renderCards);
        renderCards();

        function openMap(loc, title) {
            document.getElementById('mapTitle').innerText = title;
            document.getElementById('mapLoc').innerText = "場所: " + loc;
            document.getElementById('mapModal').style.display = 'flex';
        }

        // === 3. 管理者機能 (編集・削除・日時) ===
        function openAdmin() {
            document.getElementById('adminModal').style.display = 'flex';
            document.getElementById('adminLogin').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('passInput').value = '';
        }
        function closeAdmin() { document.getElementById('adminModal').style.display = 'none'; }

        function login() {
            if(document.getElementById('passInput').value === (localStorage.getItem(PASS_KEY) || DEFAULT_PASS)) {
                document.getElementById('adminLogin').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                loadDateSetting();
                renderAdminList();
            } else {
                document.getElementById('loginMsg').innerText = 'パスワードが違います';
            }
        }

        // 日時設定
        function loadDateSetting() {
            document.getElementById('dateInput').value = localStorage.getItem(DATE_KEY) || DEFAULT_DATE;
        }
        function saveDate() {
            const val = document.getElementById('dateInput').value;
            if(!val) return;
            localStorage.setItem(DATE_KEY, val);
            alert('開催日時を更新しました');
            updateTimer(); // タイマー即時反映
        }

        // 管理リスト描画
        function renderAdminList() {
            const container = document.getElementById('adminListContainer');
            container.innerHTML = '';
            eventData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'admin-list-item';
                div.innerHTML = `
                    <div class="item-info">
                        <span style="color:var(--main-cyan); font-weight:bold;">${item.group}</span>
                        <span>${item.title}</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn-sm btn-edit" onclick="openEdit('${item.id}')">編集</button>
                        <button class="btn-sm btn-del" onclick="deleteItem('${item.id}')">削除</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // 削除機能
        function deleteItem(id) {
            if(confirm('本当にこのデータを削除しますか？')) {
                eventData = eventData.filter(e => e.id !== id);
                localStorage.setItem(DB_KEY, JSON.stringify(eventData));
                renderAdminList(); // リスト更新
                renderCards();     // 裏側のメイン画面も更新
            }
        }

        // 編集機能
        function openEdit(id) {
            const item = eventData.find(e => e.id === id);
            if(!item) return;
            document.getElementById('editId').value = item.id;
            document.getElementById('editGroup').value = item.group;
            document.getElementById('editTitle').value = item.title;
            document.getElementById('editDesc').value = item.desc;
            document.getElementById('editLoc').value = item.location;
            document.getElementById('editType').value = item.type;
            document.getElementById('editFormModal').style.display = 'flex';
        }

        function saveEdit() {
            const id = document.getElementById('editId').value;
            const idx = eventData.findIndex(e => e.id === id);
            if(idx > -1) {
                eventData[idx].group = document.getElementById('editGroup').value;
                eventData[idx].title = document.getElementById('editTitle').value;
                eventData[idx].desc = document.getElementById('editDesc').value;
                eventData[idx].location = document.getElementById('editLoc').value;
                eventData[idx].type = document.getElementById('editType').value;
                
                localStorage.setItem(DB_KEY, JSON.stringify(eventData));
                document.getElementById('editFormModal').style.display = 'none';
                renderAdminList();
                renderCards();
                alert('保存しました');
            }
        }

        function resetData() {
            if(confirm('警告: 全データを初期化し、クラス生成をやり直します。よろしいですか？')) {
                localStorage.removeItem(DB_KEY);
                location.reload();
            }
        }
        
        function changePass() {
            const p = prompt("新しいパスワードを入力:");
            if(p) { localStorage.setItem(PASS_KEY, p); alert("変更しました"); }
        }

        // === 4. タイマー & 背景 ===
        function updateTimer() {
            const targetDate = localStorage.getItem(DATE_KEY) || DEFAULT_DATE;
            const diff = new Date(targetDate).getTime() - new Date().getTime();
            if (diff < 0) return;
            document.getElementById('d').innerText = Math.floor(diff / (86400000)).toString().padStart(2,'0');
            document.getElementById('h').innerText = Math.floor((diff % 86400000) / 3600000).toString().padStart(2,'0');
            document.getElementById('m').innerText = Math.floor((diff % 3600000) / 60000).toString().padStart(2,'0');
            document.getElementById('s').innerText = Math.floor((diff % 60000) / 1000).toString().padStart(2,'0');
        }
        setInterval(updateTimer, 1000); updateTimer();

        // 背景アニメーション
        const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
        let w, h, p = [];
        function init() { w=canvas.width=innerWidth; h=canvas.height=innerHeight; p=[]; for(let i=0;i<w*h/10000;i++) p.push({x:Math.random()*w,y:Math.random()*h,s:Math.random()*2,sp:Math.random()*0.5+0.1}); }
        function anim() {
            ctx.clearRect(0,0,w,h); ctx.fillStyle="rgba(0,240,255,0.8)";
            p.forEach(e=>{ e.y-=e.sp; if(e.y<0)e.y=h; ctx.globalAlpha=Math.random(); ctx.beginPath(); ctx.arc(e.x,e.y,e.s,0,Math.PI*2); ctx.fill(); });
            requestAnimationFrame(anim);
        }
        window.onresize=init; init(); anim();

        /* CSSアニメーション追加 */
        const style = document.createElement('style');
        style.innerHTML = `@keyframes fadeIn { to { opacity:1; transform:translateY(0); } }`;
        document.head.appendChild(style);
